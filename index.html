        :root {
          --app-height: 100%;

        html, body {

            margin: 0;

        .tag-pill {
            background: #F0F9EB;
            color: #67C23A;
            border: 1px solid #E1F3D8;
        }
        .fab-shadow {
            box-shadow: 0 4px 12px rgba(177, 211, 74, 0.4);
        }

        }
